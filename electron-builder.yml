appId: com.stash.app
productName: Stash
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
extraResources:
  - from: src/main/ocr.swift
    to: ocr.swift
  - from: src/main/contacts.swift
    to: contacts.swift
  - from: src/main/icloud.swift
    to: icloud.swift
  - from: src/main/auth.swift
    to: auth.swift
asarUnpack:
  - resources/**
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSContactsUsageDescription: Stash uses your Contacts to show names and photos for your iMessage conversations.
  notarize: false
  category: public.app-category.utilities
dmg:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
